<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - Python Mini Project</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: #1e293b; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 40px rgba(0,0,0,0.3); max-width: 500px; width: 90%; }
        h1 { text-align: center; margin-bottom: 1.5rem; color: #38bdf8; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #94a3b8; }
        input[type="number"] { width: 100%; padding: 0.75rem; border: 1px solid #334155; border-radius: 0.5rem; background: #0f172a; color: #e2e8f0; font-size: 1rem; }
        .checkbox-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
        .checkbox-label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .checkbox-label input { width: 1rem; height: 1rem; }
        .btn { width: 100%; padding: 0.75rem; border: none; border-radius: 0.5rem; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #38bdf8; color: #0f172a; font-weight: 600; }
        .btn-primary:hover { background: #0ea5e9; }
        .btn-copy { background: #334155; color: #e2e8f0; margin-top: 0.5rem; }
        .btn-copy:hover { background: #475569; }
        .password-output { background: #0f172a; padding: 1rem; border-radius: 0.5rem; margin-top: 1rem; font-family: monospace; font-size: 1.25rem; text-align: center; word-break: break-all; min-height: 3rem; display: flex; align-items: center; justify-content: center; }
        .strength { margin-top: 0.5rem; text-align: center; font-size: 0.875rem; }
        .strength-weak { color: #f87171; }
        .strength-medium { color: #fbbf24; }
        .strength-strong { color: #34d399; }
    </style>
</head>
<body>
    <div class="container">
        <h1>?? Password Generator</h1>
        <div class="form-group">
            <label for="length">Password Length</label>
            <input type="number" id="length" min="8" max="64" value="16">
        </div>
        <div class="form-group">
            <div class="checkbox-group">
                <label class="checkbox-label"><input type="checkbox" id="uppercase" checked> Uppercase (A-Z)</label>
                <label class="checkbox-label"><input type="checkbox" id="lowercase" checked> Lowercase (a-z)</label>
                <label class="checkbox-label"><input type="checkbox" id="numbers" checked> Numbers (0-9)</label>
                <label class="checkbox-label"><input type="checkbox" id="symbols" checked> Symbols (!@#$)</label>
            </div>
        </div>
        <button class="btn btn-primary" onclick="generatePassword()">Generate Password</button>
        <div class="password-output" id="output">Click Generate</div>
        <div class="strength" id="strength"></div>
        <button class="btn btn-copy" onclick="copyPassword()">?? Copy to Clipboard</button>
    </div>
    <script>
        function generatePassword() {
            const length = document.getElementById('length').value;
            const useUpper = document.getElementById('uppercase').checked;
            const useLower = document.getElementById('lowercase').checked;
            const useNumbers = document.getElementById('numbers').checked;
            const useSymbols = document.getElementById('symbols').checked;
            let chars = '';
            if (useUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (useLower) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (useNumbers) chars += '0123456789';
            if (useSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
            if (!chars) { document.getElementById('output').textContent = 'Select at least one option'; return; }
            let password = '';
            const array = new Uint32Array(length);
            crypto.getRandomValues(array);
            for (let i = 0; i < length; i++) password += chars[array[i] % chars.length];
            document.getElementById('output').textContent = password;
            updateStrength(password);
        }
        function updateStrength(password) {
            const el = document.getElementById('strength');
            let score = 0;
            if (password.length >= 12) score++;
            if (password.length >= 16) score++;
            if (/[A-Z]/.test(password) && /[a-z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;
            if (score <= 2) { el.textContent = 'Weak'; el.className = 'strength strength-weak'; }
            else if (score <= 3) { el.textContent = 'Medium'; el.className = 'strength strength-medium'; }
            else { el.textContent = 'Strong'; el.className = 'strength strength-strong'; }
        }
        function copyPassword() {
            const text = document.getElementById('output').textContent;
            if (text && text !== 'Click Generate' && text !== 'Select at least one option') {
                navigator.clipboard.writeText(text);
                const btn = document.querySelector('.btn-copy');
                btn.textContent = '? Copied!';
                setTimeout(() => btn.textContent = '?? Copy to Clipboard', 2000);
            }
        }
        generatePassword();
    </script>
</body>
</html>
